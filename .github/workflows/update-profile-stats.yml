name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Stats SVG
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_LOGIN: MohamedMohana
        run: python scripts/generate_profile_stats_svg.py

      - name: Commit Updated SVG
        run: |
          if git diff --quiet -- assets/github-stats.svg; then
            echo "No stats changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git commit -m "chore: refresh profile stats"
          git push
