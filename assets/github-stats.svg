<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohamed Mohana GitHub snapshot</title>
  <desc id="desc">Self-hosted GitHub profile snapshot with repository, follower, star, contribution, and language metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120F22" />
      <stop offset="1" stop-color="#1F1636" />
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="230" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#231A3D" />
      <stop offset="1" stop-color="#17112D" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F472B6" />
      <stop offset="1" stop-color="#38BDF8" />
    </linearGradient>
    <style>
      .heading {
        font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #F8FAFC;
      }
      .subheading {
        font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #CBD5E1;
      }
      .metric-value {
        font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #F8FAFC;
      }
      .metric-label {
        font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #C084FC;
      }
      .section-label {
        font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #F9A8D4;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .language-name {
        font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #E2E8F0;
      }
      .language-count {
        font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #94A3B8;
      }
      .footer {
        font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #94A3B8;
      }
    </style>
  </defs>

  <rect x="10" y="10" width="880" height="320" rx="28" fill="url(#bg)" />
  <rect x="10.5" y="10.5" width="879" height="319" rx="27.5" stroke="rgba(255,255,255,0.10)" />

  <circle cx="70" cy="64" r="18" fill="url(#accent)" opacity="0.95" />
  <rect x="96" y="47" width="244" height="9" rx="4.5" fill="url(#accent)" opacity="0.95" />
  <text x="44" y="108" class="heading">Mohamed Mohana</text>
  <text x="44" y="132" class="subheading">@MohamedMohana • self-hosted profile stats</text>

  
    <g transform="translate(44 102)">
      <rect width="230" height="86" rx="20" fill="url(#cardFill)" stroke="rgba(255,255,255,0.08)" />
      <text x="20" y="36" class="metric-value">29</text>
      <text x="20" y="63" class="metric-label">Public Repos</text>
    </g>
    <g transform="translate(318 102)">
      <rect width="230" height="86" rx="20" fill="url(#cardFill)" stroke="rgba(255,255,255,0.08)" />
      <text x="20" y="36" class="metric-value">7</text>
      <text x="20" y="63" class="metric-label">Followers</text>
    </g>
    <g transform="translate(592 102)">
      <rect width="230" height="86" rx="20" fill="url(#cardFill)" stroke="rgba(255,255,255,0.08)" />
      <text x="20" y="36" class="metric-value">11</text>
      <text x="20" y="63" class="metric-label">Following</text>
    </g>
    <g transform="translate(44 214)">
      <rect width="230" height="86" rx="20" fill="url(#cardFill)" stroke="rgba(255,255,255,0.08)" />
      <text x="20" y="36" class="metric-value">6</text>
      <text x="20" y="63" class="metric-label">Total Stars</text>
    </g>
    <g transform="translate(318 214)">
      <rect width="230" height="86" rx="20" fill="url(#cardFill)" stroke="rgba(255,255,255,0.08)" />
      <text x="20" y="36" class="metric-value">787</text>
      <text x="20" y="63" class="metric-label">Contributions (1y)</text>
    </g>

  <line x1="592" y1="112" x2="592" y2="290" stroke="rgba(255,255,255,0.08)" />
  <text x="622" y="118" class="section-label">Top Languages</text>
  
    <g transform="translate(622 144)">
      <circle cx="10" cy="0" r="6" fill="#3572A5" />
      <text x="28" y="5" class="language-name">Python</text>
      <text x="220" y="5" text-anchor="end" class="language-count">10 repos</text>
    </g>
    <g transform="translate(622 174)">
      <circle cx="10" cy="0" r="6" fill="#DA5B0B" />
      <text x="28" y="5" class="language-name">Jupyter Notebook</text>
      <text x="220" y="5" text-anchor="end" class="language-count">9 repos</text>
    </g>
    <g transform="translate(622 204)">
      <circle cx="10" cy="0" r="6" fill="#F05138" />
      <text x="28" y="5" class="language-name">Swift</text>
      <text x="220" y="5" text-anchor="end" class="language-count">3 repos</text>
    </g>
    <g transform="translate(622 234)">
      <circle cx="10" cy="0" r="6" fill="#701516" />
      <text x="28" y="5" class="language-name">Ruby</text>
      <text x="220" y="5" text-anchor="end" class="language-count">1 repos</text>
    </g>
    <g transform="translate(622 264)">
      <circle cx="10" cy="0" r="6" fill="#f1e05a" />
      <text x="28" y="5" class="language-name">JavaScript</text>
      <text x="220" y="5" text-anchor="end" class="language-count">1 repos</text>
    </g>

  <text x="44" y="308" class="footer">Generated in-repo from the GitHub GraphQL API</text>
  <text x="856" y="308" text-anchor="end" class="footer">Updated 2026-03-28 18:38 UTC</text>
</svg>
